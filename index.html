<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Phase Comparison Dashboard</title>
<link rel="stylesheet" href="style.css" />
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>
<body>
  <header>
    <h1>📊 Phase Comparison Dashboard</h1>
    <p class="subtitle">Phase 1 vs Phase 2 vs Phase 3 vs Phase 4</p>
  </header>

  <section class="upload-card">
    <label for="csvFile" class="upload-btn">📁 Upload CSV (export from Google Sheet)</label>
    <input type="file" id="csvFile" accept=".csv" hidden />
    <p id="status">No file loaded — using demo data</p>
  </section>

  <section class="kpi-grid" id="kpiGrid"></section>

  <section class="chart-card">
    <h2>Total Employees per Phase</h2>
    <canvas id="empChart"></canvas>
  </section>

  <section class="chart-card">
    <h2>Required FTE per Phase</h2>
    <canvas id="fteChart"></canvas>
  </section>

  <section class="chart-card">
    <h2>Overloaded vs Underutilised Roles</h2>
    <canvas id="loadChart"></canvas>
  </section>

  <section class="chart-card">
    <h2>Average Workload by Section (per Phase)</h2>
    <canvas id="sectionChart"></canvas>
  </section>

  <section class="table-card">
    <h2>Phase-by-Phase Comparison</h2>
    <div class="table-wrap">
      <table id="compareTable"></table>
    </div>
  </section>

  <footer>
    <p>Summary of Manpower Reduction Project</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
